<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Mobile Product Analysis + Chatbot — scrape, store, analyze and chat over smartphone data">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#125a4d"/>
      <stop offset="1" stop-color="#1b9c85"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#e9c46a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e9c46a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: smartphone showing an analytics chart, with a chat bubble -->
  <g transform="translate(980,190)" stroke="#e9c46a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- phone body -->
    <rect x="-70" y="-80" width="120" height="170" rx="16"/>
    <!-- speaker -->
    <line x1="-30" y1="-66" x2="10" y2="-66"/>
    <!-- home indicator -->
    <line x1="-22" y1="74" x2="2" y2="74"/>
    <!-- analytics bars inside screen -->
    <line x1="-46" y1="46" x2="-46" y2="20"/>
    <line x1="-26" y1="46" x2="-26" y2="0"/>
    <line x1="-6" y1="46" x2="-6" y2="-18"/>
    <line x1="14" y1="46" x2="14" y2="-6"/>
    <!-- chat bubble floating off the phone -->
    <path d="M54 -64 h64 a14 14 0 0 1 14 14 v34 a14 14 0 0 1 -14 14 h-34 l-22 18 v-18 h-8 a14 14 0 0 1 -14 -14 v-34 a14 14 0 0 1 14 -14 z"/>
    <line x1="68" y1="-44" x2="104" y2="-44"/>
    <line x1="68" y1="-28" x2="96" y2="-28"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Mobile Product Analysis</text>
  <text x="84" y="208" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff">+ Chatbot</text>
  <text x="84" y="258" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" fill="#e9c46a">Scrape · Store · Analyze · Chat</text>
  <text x="84" y="306" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23" fill="#dcefe9">Smartphone market data from daraz.pk, served through a Flask chatbot dashboard.</text>
  <text x="84" y="340" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#9ec9bf">Selenium · pandas · SQLite · NLTK · fuzzywuzzy · Flask</text>
</svg>
